,line16:"الخط 16",onTime:"منتظم",delayed:"متأخر 4 د",incoming:"قادم",activeText:"تتبع نشط",etaVal:"دقيقتان"},coverage:{label:"التغطية",heading:"متوفر في مختلف أنحاء الجزائر",sub:"نتوسع بسرعة — يتم إضافة المزيد من المدن والخطوط كل شهر.",more:"+ المزيد قريباً",cities:["الجزائر العاصمة","وهران","قسنطينة","عنابة","سطيف","البليدة","تيزي وزو","باتنة"]},download:{heading:"اليوم",downloadText:"حمل تطبيق",desc:"انضم إلى آلاف الركاب وتنقل بذكاء أكبر في مختلف المدن الجزائرية. إنه مجاني بالكامل.",getItOn:"تحميل من"},footer:{privacy:"سياسة الخصوصية",contact:"اتصل بنا",madeWith:"صنع بـ 💚 في الجزائر"}}};function ih({lang:_,setView:k}){const h={en:{title:"Privacy Policy",updated:"Last updated: June 22, 2026",intro:"At Chriki (شريكي), we are committed to protecting your privacy. This Privacy Policy details exactly how we treat your information when you use our mobile application and our website. We do not sell or share any user details, and only collect essential information required to deliver public transit services.",sections:[{title:"1. Information We Collect",content:"We believe in extreme data minimization. We only collect the following details from our users:",bullets:["Email Address: We only collect user email addresses (such as drivers or users of the Ween/Chriki live platform) during signup or communication. No other personal data, names, or addresses are collected.","Location Information (Drivers): For drivers on the Ween live-transit tracking panel, we collect precise geoposition statistics. This allows you to broadcast your active bus trajectory on our public map feed to assist commuters.","Location Information (Commuters): For Tariqi users (passengers), location sharing is completely optional. If authorized, it is used locally on your device solely to calculate and display the nearest bus stops around your current start point. We do not store or track commuter position histories."]},{title:"2. Background Location & Run States",content:"Our system treats device resources and battery health with great care:",bullets:["For Drivers: The application can work in the background when you choose to share your live GPS location. This ensures you can seamlessly broadcast the bus's active route coordinates to waiting passengers even if your screen is locked or turned off.","For Tariqi Users: The application will NOT work or fetch location updates in the background. Location processing only occurs in the foreground when the passenger is actively searching for routes, keeping your device clean and saving battery."]},{title:"3. How We Use and Protect Your Information",content:"We use the collected email addresses and coordinates solely to power and enhance your public transit experience across Algeria's streets. We prioritize your privacy above all. We do not sell, rent, trade, or share your email database, personal coordinates, or trip history with third-party advertisers or unauthorized platforms under any circumstances. Any commuter location queries run are calculated securely on-the-fly and processed in temporary index memory.",bullets:[]},{title:"4. Algerian Data Protection Compliance",content:"Our system and data structures are built to align with Algerian safety protocols, notably Law No. 18-07 regarding the Protection of Physical Persons in the Treatment of Personal Data. We process and secure information according to these legal guidelines.",bullets:[]},{title:"5. Your Controls and Rights",content:"You maintain full sovereignty over your data:",bullets:["Permissions: You can authorize or deny location services access anytime through your Android/iOS system settings.","De-Anonymization: Your trip planning operations are stored locally on your device and are never matched with active user directories, maintaining your complete daily privacy."]},{title:"6. Support & Inquiries",content:"If you have any questions, feedback, or concerns regarding your privacy, feel free to contact us:",bullets:["Email: contact@chriki.com","Cooperation: dev@chriki.com"]}],back:"Back to Home"},fr:{title:"Politique de Confidentialité",updated:"Dernière mise à jour : 22 Juin 2026",intro:"Chez Chriki (شريكي), nous nous engageons à protéger votre vie privée. Cette politique de confidentialité explique en détail comment nous traitons vos informations lorsque vous utilisez notre application mobile et notre site Web. Nous ne vendons ni ne partageons vos données, et nous ne récoltons que le strict minimum nécessaire au bon fonctionnement du service.",sections:[{title:"1. Informations que nous collectons",content:"Nous appliquons un principe de minimisation stricte des données. Nous collectons uniquement les informations suivantes :",bullets:["Adresse e-mail : Nous recueillons uniquement l'adresse e-mail de nos utilisateurs (les conducteurs ou les utilisateurs de la plateforme en direct Ween/Chriki) lors de la création de compte ou des échanges d'assistance. Aucune autre donnée personnelle (nom, adresse postale, etc.) n'est demandée.","Données de localisation (Conducteurs) : Pour les chauffeurs partenaires sur la plateforme de suivi en direct Ween, nous collectons des données de géolocalisation précises. Cela vous permet de diffuser activement l'itinéraire de votre bus sur notre carte publique pour aider les voyageurs en attente.","Données de localisation (Voyageurs) : Pour les utilisateurs Tariqi (voyageurs), le partage de position est entièrement facultatif. S'il est autorisé, il sert uniquement de manière locale sur votre téléphone à détecter et afficher les arrêts de bus à proximité de votre point de départ. Nous n'enregistrons ni ne suivons vos mouvements."]},{title:"2. Utilisation de la position en arrière-plan",content:"Notre application gère les ressources de votre téléphone et l'autonomie de votre batterie avec le plus grand soin :",bullets:["Pour les Conducteurs : L'application peut fonctionner en arrière-plan lorsque vous choisissez de partager votre position GPS en temps réel. Cela permet de continuer à diffuser l'itinéraire de votre bus aux usagers, même si l'écran de votre téléphone est verrouillé ou éteint.","Pour les Utilisateurs Tariqi (Voyageurs) : L'application ne fonctionne PAS en arrière-plan et ne récupère jamais votre localisation en arrière-plan. La détection de la position s'effectue exclusivement au premier plan lorsque l'utilisateur cherche activement un trajet ou un arrêt."]},{title:"3. Traitement et protection de vos informations",content:"Nous utilisons vos e-mails et coordonnées GPS uniquement pour optimiser votre expérience de transport en Algérie. Votre vie privée est sacrée. En aucun cas nous ne vendons, louons, échangeons ou partageons votre adresse e-mail ou votre historique de voyage avec des annonceurs ou des tiers. Toutes les requêtes de trajet voyageurs sont calculées à la volée de manière sécurisée et ne sont conservées que temporairement.",bullets:[]},{title:"4. Conformité à la réglementation algérienne",content:"Conformément à la loi n° 18-07 relative à la protection des personnes physiques dans le traitement des données à caractère personnel en Algérie, nous mettons en œuvre toutes les mesures techniques pour assurer la sécurité absolue de vos données.",bullets:[]},{title:"5. Vos choix et vos droits",content:"Vous gardez le contrôle total sur vos données à tout moment :",bullets:["Autorisations : Vous pouvez activer ou révoquer l'accès à la localisation à tout moment via les paramètres de votre smartphone.","Anonymat local : Vos historiques de recherche de trajet restent stockés localement sur votre téléphone et ne sont associés à aucun dossier d'inscription d'utilisateurs actifs."]},{title:"6. Nous contacter",content:"Pour toute question relative à cette politique de confidentialité ou à la gestion de vos données personnelles :",bullets:["Email : contact@chriki.com","Partenariats : dev@chriki.com"]}],back:"Retour à l'accueil"},ar:{title:"سياسة الخصوصية",updated:"آخر تحديث: 22 يونيو 2026",intro:"نحن في شريكي (Chriki) ملتزمون بحماية خصوصيتك وأمان بياناتك. توضح سياسة الخصوصية هذه بالتفصيل كيفية التعامل مع معلوماتك عند استخدام تطبيقنا وموقعنا الإلكتروني. نحن لا نبيع أو نشارك تفاصيل المستخدمين، ونجمع فقط البيانات الأساسية والضرورية لتشغيل وتسهيل خدمات النقل العام.",sections:[{title:"1. البيانات التي نجمعها",content:"نحن نؤمن بالحد الأدنى المطلق لجمع البيانات. البيانات الوحيدة التي نقوم بجمعها من مستخدمينا هي:",bullets:["البريد الإلكتروني: نجمع فقط عناوين البريد الإلكتروني للمستخدمين (سواء كانوا سائقين أو مستخدمي منصة البث المباشر Ween/Chriki) عند التسجيل أو المراسلة. لا يتطلب التطبيق أي بيانات شخصية أخرى مثل الاسم الكامل أو العنوان.","بيانات الموقع الجغرافي (للسائقين): بالنسبة للسائقين على نظام التتبع المباشر Ween، نحدد ونجمع إحداثيات الموقع بدقة لبث مسلك الحافلة الفعلي على الخريطة ومساعدة الركاب المنتظرين.","بيانات الموقع الجغرافي (للركاب): بالنسبة لمستخدمي مسار Tariqi (المسافرين)، فإن مشاركة الموقع اختيارية بالكامل. في حال تفعيلها، تُسخدم محلياً على هاتفك فقط لتحديد وعرض أقرب محطات الحافلات إليك كنتقة انطلاق. نحن لا نقوم بتسجيل أو تتبع تحركات الركاب اليومية."]},{title:"2. ميزة تشغيل الموقع في الخلفية",content:"يتعامل نظامنا مع موارد جهازك وطاقة بطاريتك بأقصى درجات الاهتمام والكفاءة:",bullets:["بالنسبة للسائقين: يمكن للتطبيق العمل في الخلفية (Background) عندما يقوم السائق بمشاركة موقعه مباشرة عبر الـ GPS. يضمن ذلك استمرار بث إحداثيات الحافلة ومسارها للركاب بانتظام حتى لو كانت شاشة الهاتف مغلقة أو تم قفلها.","بالنسبة لمستخدمي Tariqi (المسافرين): التطبيق لا يعمل بالخلفية مطلقاً ولا يتتبع موقعك عند غلق التطبيق. قراءة الموقع تتم فقط في الواجهة (Foreground) وأثناء البحث النشط عن المحطات لتوفير طاقة بطارية هاتفك بالكامل."]},{title:"3. كيف نستخدم بياناتك ونحميها",content:"نستخدم البريد الإلكتروني والموقع الجغرافي المسجل فقط لتطوير وتسهيل تنقلك اليومي عبر شوارع ومدن الجزائر. خصوصيتك فوق كل اعتبار. لا نقوم إطلاقاً ببيع، تأجير، تداول، أو مشاركة بريدك الإلكتروني أو مساراتك الجغرافية مع أي شركات إعلانية أو جهات خارجية تحت أي ظرف. جميع عمليات البحث تُعالج لحظياً وبأعلى معايير الأمان دون تخرين طويل الأمد.",bullets:[]},{title:"4. الامتثال للقوانين الجزائرية لحماية البيانات",content:"تم تصميم وتطوير شريكي تماشياً مع القوانين والأنظمة السارية في الجزائر، ولا سيما القانون رقم 18-07 المتعلق بحماية الأشخاص الطبيعيين في مجال معالجة المعطيات ذات الطابع الشخصي، مما يضمن احتراماً تاماً لسلامتكم وبياناتكم.",bullets:[]},{title:"5. خيارات المستخدم وحقوقه",content:"أنت صاحب القرار وصاحب السيادة الكاملة على بياناتك:",bullets:["صلاحيات الموقع: يمكنك تفعيل أو إلغاء صلاحية الوصول إلى موقعك الجغرافي في أي وقت من خلال إعدادات نظام تشغيل هاتفك.","خصوصية البحث المحفوظة: تُخزن سجلات البحث عن المحطات محلياً على جهازك وليست مربوطة بهوية شخصية محددة."]},{title:"6. التواصل والدعم",content:"إذا كانت لديك أي استفسارات أو أسئلة بخصوص سياسة الخصوصية الخاصة بنا:",bullets:["البريد الإلكتروني: contact@chriki.com","للتواصل والتعاون: dev@chriki.com"]}],back:"العودة للرئيسية"}}[_];return f.jsxs("div",{className:"mx-auto max-w-4xl px-5 py-12 md:py-20 animate-fade-in text-slate-800",children:[f.jsxs("button",{onClick:()=>{k("home"),window.scrollTo({top:0,behavior:"smooth"})},className:"mb-8 flex items-center gap-2 rounded-full border border-slate-200 bg-white px-4 py-2 text-sm font-semibold text-slate-600 shadow-sm transition hover:border-emerald-300 hover:text-emerald-700 cursor-pointer",children:[f.jsx("span",{children:"←"}),f.jsx("span",{children:h.back})]}),f.jsxs("div",{className:"border-b border-slate-100 pb-8 text-left rtl:text-right",children:[f.jsx("h1",{className:"text-3xl font-extrabold tracking-tight sm:text-4xl text-slate-900 leading-tight",children:h.title}),f.jsx("p",{className:"mt-2 text-sm font-semibold text-emerald-600",children:h.updated}),f.jsx("p",{className:"mt-6 text-base leading-relaxed text-slate-600",children:h.intro})]}),f.jsx("div",{className:"mt-10 space-y-10 text-left rtl:text-right",children:h.sections.map((B,Q)=>f.jsxs("div",{className:"group relative",children:[f.jsx("h2",{className:"text-xl font-bold text-slate-900 border-l-4 rtl:border-l-0 rtl:border-r-4 border-emerald-500 pl-3 rtl:pl-0 rt
